<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Mijn Planningstool</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
        }
        input {
            padding: 10px;
            width: 70%;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        li {
            background: white;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            list-style: none;
        }
    </style>
</head>
<body>
    <h1>📝 Mijn Planningstool</h1>
    <input type="text" id="nieuweТаak" placeholder="Nieuwe taak...">
    <button onclick="voegTaakToe()">Toevoegen</button>
    <ul id="takenLijst"></ul>

    <script>
        async function laadTaken() {
            const response = await fetch("http://localhost:8000/taken");
            const taken = await response.json();
            const lijst = document.getElementById("takenLijst");
            lijst.innerHTML = "";
            taken.forEach(taak => {
                lijst.innerHTML += `<li>${taak.klaar ? "✅" : "⬜"} ${taak.titel} 
                <button onclick="vinkAf(${taak.id})")>Afvinken</button></li>`;
            });
        }

        async function voegTaakToe() {
            const input = document.getElementById("nieuweТаak");
            await fetch("http://localhost:8000/taken", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({"titel": input.value})
            });
            input.value = "";
            laadTaken();
        }

        async function vinkAf(id) {
            await fetch(`http://localhost:8000/taken/${id}`, {
                method: "PUT"
            });
            laadTaken();
        }

        laadTaken();
    </script>
</body>
</html>
